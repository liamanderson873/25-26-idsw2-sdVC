# CONFIGURACIÓN DEL SERVIDOR
server.port=9090

# CONFIGURACIÓN DE LA BASE DE DATOS (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/jorgestor_db
spring.datasource.username=postgres
spring.datasource.password=ace

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Batch inserts: agrupa los INSERT/UPDATE en lotes de 30 → reduce round-trips a BD
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# MANTENIMIENTO (true solo para resetear la BD desde cero)
jorgestor.db.clean-on-startup=false
jorgestor.db.populate-on-startup=false
